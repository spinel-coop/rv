name: Test

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  merge_group:
    types: [checks_requested]
  workflow_dispatch:

permissions:
  contents: read

env:
  CARGO_TERM_COLOR: always

jobs:
  cargo-deny:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        checks:
          - advisories
          - bans sources
    # Prevent sudden announcement of a new advisory from failing ci:
    continue-on-error: ${{ matrix.checks == 'advisories' }}
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install cargo-deny
        uses: EmbarkStudios/cargo-deny-action@3fd3802e88374d3fe9159b834c7714ec57d6c979 # v2.0.15
        with:
          command: check ${{ matrix.checks }}

  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses]

      - name: Cache dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Build rv
        run: bin/build

      - name: Upload rv binary
        uses: actions/upload-artifact@330a01c490aca151604b8cf639adc76d48f6c5d4 # v5.0.0
        with:
          name: rv-binary
          path: target/release/rv

  lint:
    name: Lint (${{ matrix.os }})
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: linux
            runs-on: ubuntu-latest
          - os: windows
            runs-on: windows-latest
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses]
        with:
          components: rustfmt, clippy

      - name: Cache dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Run linters (Unix)
        if: matrix.os == 'linux'
        run: ./bin/lint

      - name: Run linters (Windows)
        if: matrix.os == 'windows'
        run: ./win/lint.ps1

  run-tests:
    name: Run tests
    needs: lint
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        runs-on:
          - macos-15-intel # mac-x86
          - macos-latest # mac-arm
          - ubuntu-latest # linux-x86
          - ubuntu-24.04-arm # linux-arm
          - windows-latest # win-x86
          - windows-11-arm # win-arm

    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Install additional shells
        if: startsWith(matrix.runs-on, 'ubuntu')
        run: sudo apt-get update && sudo apt-get install -y zsh fish

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable # zizmor: ignore[unpinned-uses]

      - name: Install nextest
        uses: taiki-e/install-action@nextest
        if: matrix.runs-on != 'windows-11-arm'

      # Workaround https://github.com/actions/partner-runner-images/issues/169
      - name: Install nextest (windows-11-arm)
        run: |
          $tmp = New-TemporaryFile | Rename-Item -NewName { $_ -replace 'tmp$', 'zip' } -PassThru
          Invoke-WebRequest -OutFile $tmp https://get.nexte.st/latest/windows-arm
          $outputDir = Join-Path $Env:CARGO_HOME "bin"
          $tmp | Expand-Archive -DestinationPath $outputDir -Force
          $tmp | Remove-Item
        if: matrix.runs-on == 'windows-11-arm'

      - name: Cache dependencies
        uses: Swatinem/rust-cache@779680da715d629ac1d338a641029a2f4372abb5 # v2.8.2

      - name: Build tests
        shell: bash
        run: ./bin/test --no-run

      - name: Run tests
        shell: bash
        run: ./bin/test

      - name: Run Windows integration tests
        if: ${{ startsWith(matrix.runs-on, 'windows') }}
        run: ./win/test-integration.ps1

      - name: Run Unix integration tests
        if: ${{ ! startsWith(matrix.runs-on, 'windows') }}
        run: ./bin/test-integration

  smoke-test:
    name: ${{ matrix.project }}
    needs: build
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        project:
          - diaspora
          - discourse
          - fastlane
          # - gitlab  # Disabled until https://gitlab.com/gitlab-org/gitlab/-/issues/522903 is resolved
          - homebrew
          - huginn
          - llhttp-ffi
          - lobsters
          - local-gemspec
          - mastodon
    steps:
      - name: Check out repo
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false

      - name: Download rv binary
        uses: actions/download-artifact@634f93cb2916e3fdff6788551b99b062d0335ce0 # v5.0.0
        with:
          name: rv-binary
          path: ~/bin

      - name: Add rv to PATH
        run: chmod +x ~/bin/rv && echo "$HOME/bin" >> $GITHUB_PATH

      - name: rv clean-install for ${{ matrix.project }}
        run: bin/smoke-tests/${{ matrix.project }}
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
